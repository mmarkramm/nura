<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nura 🎂</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: black;
}

/* Scene container */
.scene {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* Background image */
.scene img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* IMPORTANT: keeps your drawing aligned */
}

/* Dialogue text (placed INSIDE your drawn box area) */
.dialogue-text {
  position: absolute;
  top: 8%; /* adjust if needed */
  left: 50%;
  transform: translateX(-50%);
  width: 55%;
  text-align: center;
  font-size: 3.5vw;
  max-font-size: 18px;
  color: #333;
  pointer-events: none;
}

/* Bottom text */
.bottom-text {
  position: absolute;
  bottom: 5%;
  width: 100%;
  text-align: center;
  font-size: 4vw;
  color: #444;
}

/* Hug progress bar */
.progress-container {
  position: absolute;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 8px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  display: none;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #ff9aa2;
}
</style>
</head>

<body>

<div class="scene" id="scene">

  <!-- BACKGROUND -->
  <img id="bg" src="opening.png">

  <!-- DIALOGUE TEXT (inside your drawn bubble) -->
  <div class="dialogue-text" id="dialogue">
    tap me :)
  </div>

  <!-- BOTTOM TEXT -->
  <div class="bottom-text" id="bottom">
    tap me :)
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
  </div>

</div>

<script>
const dialogue = document.getElementById("dialogue");
const bottom = document.getElementById("bottom");
const bg = document.getElementById("bg");
const progressContainer = document.getElementById("progressContainer");
const progressBar = document.getElementById("progressBar");

let step = 0;
let scene = 1;

/* SCENE 1 DIALOGUE */
const lines = [
  "hii...",
  "ohhh wait it's youuu, nura!!",
  "i didn’t think you’d come here 🥺",
  "i just wanted to say...",
  "happy birthdayyy again :)",
  "can i hug you?"
];

/* SCENE 3 RANDOM LINES */
const messages = [
  "cutiee",
  "soft hugs",
  "i'm really glad you exist",
  "i'm here",
  "i hope you smile a lot today",
  "you deserve all the good things :)",
  "happy birthday again ! haha",
  "i'm glad today treated you gently",
  "you did well today"
];

/* TAP ANYWHERE */
document.body.addEventListener("click", () => {

  if (scene === 1) {
    if (step < lines.length) {
      dialogue.innerText = lines[step];
      bottom.innerText = "tap again :)";
      step++;
    } else {
      startHug();
    }
  }

  else if (scene === 3) {
    const random = Math.floor(Math.random() * messages.length);
    dialogue.innerText = messages[random];
  }

});

/* HOLD TO HUG */
let holding = false;
let progress = 0;
let interval;

function startHug() {
  scene = 2;
  bottom.innerText = "hold to hug";
  dialogue.innerText = "";

  progressContainer.style.display = "block";

  document.body.addEventListener("mousedown", holdStart);
  document.body.addEventListener("mouseup", holdEnd);

  document.body.addEventListener("touchstart", holdStart);
  document.body.addEventListener("touchend", holdEnd);
}

function holdStart() {
  holding = true;
  bottom.innerText = "hugging you";

  interval = setInterval(() => {
    if (!holding) return;

    progress += 2;
    progressBar.style.width = progress + "%";

    if (progress >= 100) {
      clearInterval(interval);
      bottom.innerText = "hehe thank you that felt nice";
      setTimeout(goFinal, 1500);
    }
  }, 30);
}

function holdEnd() {
  holding = false;
  clearInterval(interval);
}

/* FINAL SCENE */
function goFinal() {
  scene = 3;

  bg.src = "final.png";

  progressContainer.style.display = "none";

  dialogue.innerText = "yayy, you're still here";
  bottom.innerText = "tap me :)";
}
</script>

</body>
</html>
